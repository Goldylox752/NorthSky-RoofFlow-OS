<script>
// =========================
// CONFIG
// =========================
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

const stripe = Stripe("YOUR_STRIPE_KEY");

// =========================
// UI
// =========================
function showStep(){
  document.getElementById("stepSection").style.display = "block";
}

// =========================
// LEAD SCORING (UI only)
// =========================
function scoreLead(issue){
  issue = issue.toLowerCase();

  if(issue.includes("leak")) return 95;
  if(issue.includes("storm")) return 90;
  if(issue.includes("replacement")) return 85;

  return 75;
}

// =========================
// SUBMIT LEAD (ЁЯФе FIXED)
// =========================
async function submitLead(){
  const name = document.getElementById("h_name").value.trim();
  const phone = document.getElementById("h_phone").value.trim();
  const city = document.getElementById("h_city").value.trim();
  const issue = document.getElementById("h_issue").value.trim();
  const status = document.getElementById("leadStatus");

  if(!name || !phone || !city){
    status.innerText = "Fill required fields";
    return;
  }

  status.innerText = "Submitting...";

  try {
    const score = scoreLead(issue);

    // ЁЯФе SEND TO BACKEND ONLY
    const res = await fetch("/api/new-lead", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        phone,
        city,
        issue,
        score
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Failed");
    }

    // Optional Discord (frontend signal only)
    fetch("YOUR_DISCORD_WEBHOOK", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        content:`ЁЯЪи Lead Submitted (${score})\nЁЯУН ${city}\nЁЯЫая╕П ${issue}`
      })
    });

    status.innerText = "Submitted! A roofer will contact you.";

    // Reset form
    document.getElementById("h_name").value = "";
    document.getElementById("h_phone").value = "";
    document.getElementById("h_city").value = "";
    document.getElementById("h_issue").value = "";

  } catch(err){
    console.error(err);
    status.innerText = "Error submitting lead";
  }
}

// =========================
// CONTRACTOR SIGNUP + STRIPE
// =========================
async function registerContractor(){
  const name = document.getElementById("c_name").value.trim();
  const phone = document.getElementById("c_phone").value.trim();
  const city = document.getElementById("c_city").value.trim();
  const status = document.getElementById("status");

  if(!name || !phone || !city){
    status.innerText = "Fill all fields";
    return;
  }

  status.innerText = "Redirecting to secure checkout...";

  try {
    // ЁЯФе ONLY CALL BACKEND (it should create contractor later)
    const res = await fetch("/api/create-checkout-session", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: `${phone}@roofing.com`,
        name,
        phone,
        city
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Stripe failed");
    }

    await stripe.redirectToCheckout({ sessionId: data.id });

  } catch(err){
    console.error(err);
    status.innerText = "Error starting subscription";
  }
}

// =========================
// ADMIN DASHBOARD (READ ONLY)
// =========================
async function loadDashboard(){

  try {
    // Stats
    const { count: leadCount } = await supabase
      .from("homeowner_leads")
      .select("*", { count:"exact", head:true });

    const { count: contractorCount } = await supabase
      .from("contractors")
      .select("*", { count:"exact", head:true });

    // Leads
    const { data: leads } = await supabase
      .from("homeowner_leads")
      .select("*")
      .order("created_at", { ascending:false })
      .limit(5);

    const admin = document.getElementById("admin");

    admin.innerHTML = `
      <div class="card">ЁЯУИ Leads: ${leadCount}</div>
      <div class="card">ЁЯС╖ Contractors: ${contractorCount}</div>
    `;

    leads.forEach(l => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        ЁЯУН ${l.city}<br>
        ЁЯЫая╕П ${l.issue}<br>
        тнР ${l.score || "-"}<br>
        ЁЯУЮ ${l.phone}
      `;
      admin.appendChild(div);
    });

  } catch(err){
    console.error("Dashboard error:", err);
  }
}

// =========================
// INIT
// =========================
loadDashboard();
setInterval(loadDashboard, 5000);

</script>
