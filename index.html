<script>
// =========================
// CONFIG
// =========================
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

const stripe = Stripe("YOUR_STRIPE_KEY");

// =========================
// UI
// =========================
function showStep(){
  document.getElementById("stepSection").style.display = "block";
}

// =========================
// LEAD SCORING
// =========================
function scoreLead(issue){
  issue = issue.toLowerCase();

  if(issue.includes("leak")) return 95;
  if(issue.includes("storm")) return 90;
  if(issue.includes("replacement")) return 85;

  return 75;
}

// =========================
// SUBMIT HOMEOWNER LEAD
// =========================
async function submitLead(){
  const name = h_name.value.trim();
  const phone = h_phone.value.trim();
  const city = h_city.value.trim();
  const issue = h_issue.value.trim();
  const status = document.getElementById("leadStatus");

  if(!name || !phone || !city){
    status.innerText = "Fill required fields";
    return;
  }

  status.innerText = "Submitting...";

  try {
    const score = scoreLead(issue);

    // Save lead
    await supabase.from("homeowner_leads").insert([
      { name, phone, city, issue, score }
    ]);

    // Notify (Discord optional)
    fetch("YOUR_DISCORD_WEBHOOK", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        content:`🚨 NEW LEAD (${score})\n📍 ${city}\n🛠️ ${issue}\n📞 ${phone}`
      })
    });

    // Route lead
    await sendToContractor(city, issue, phone);

    status.innerText = "Submitted!";

    // Reset form
    h_name.value = "";
    h_phone.value = "";
    h_city.value = "";
    h_issue.value = "";

  } catch(err){
    console.error(err);
    status.innerText = "Error submitting lead";
  }
}

// =========================
// CONTRACTOR REGISTER + SUBSCRIBE
// =========================
async function registerContractor(){
  const name = c_name.value.trim();
  const phone = c_phone.value.trim();
  const city = c_city.value.trim();
  const status = document.getElementById("status");

  if(!name || !phone || !city){
    status.innerText = "Fill all fields";
    return;
  }

  status.innerText = "Processing...";

  try {
    // Save contractor
    await supabase.from("contractors").insert([
      {
        name,
        phone,
        city,
        active: false,
        leads_received: 0,
        max_leads: 20
      }
    ]);

    // Start Stripe subscription
    const res = await fetch("/api/create-subscription", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email: phone + "@roofing.com" })
    });

    const data = await res.json();

    await stripe.redirectToCheckout({ sessionId: data.id });

  } catch(err){
    console.error(err);
    status.innerText = "Error";
  }
}

// =========================
// SEND TO ONE CONTRACTOR
// =========================
async function sendToContractor(city, issue, phone){

  const { data: contractors } = await supabase
    .from("contractors")
    .select("*")
    .eq("city", city)
    .eq("active", true);

  if(!contractors || contractors.length === 0) return;

  for(const c of contractors){

    if(c.leads_received >= c.max_leads) continue;

    // Send SMS
    await fetch("/api/send-sms", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        to: c.phone,
        message: `🔥 New roofing lead\n${city}\n${issue}\n${phone}`
      })
    });

    // Update count
    await supabase
      .from("contractors")
      .update({ leads_received: c.leads_received + 1 })
      .eq("id", c.id);

    break; // ONLY 1 contractor gets it
  }
}

// =========================
// ADMIN DASHBOARD
// =========================
async function loadDashboard(){

  // Stats
  const { count: leadCount } = await supabase
    .from("homeowner_leads")
    .select("*", { count:"exact", head:true });

  const { count: contractorCount } = await supabase
    .from("contractors")
    .select("*", { count:"exact", head:true });

  // Recent leads
  const { data: leads } = await supabase
    .from("homeowner_leads")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(5);

  const admin = document.getElementById("admin");

  admin.innerHTML = `
    <div class="card">📈 Leads: ${leadCount}</div>
    <div class="card">👷 Contractors: ${contractorCount}</div>
  `;

  leads.forEach(l => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      📍 ${l.city}<br>
      🛠️ ${l.issue}<br>
      ⭐ Score: ${l.score}<br>
      📞 ${l.phone}
    `;
    admin.appendChild(div);
  });
}

// =========================
// INIT
// =========================
loadDashboard();
setInterval(loadDashboard, 5000);

</script>
